<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>E-Rank Rise</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

  <div class="overlay hidden" id="overlay">
    <h1>SYSTEM ACTIVATING...</h1>
  </div>

<div class="container">
    <div class="card">
        <h1 class="title">E-Rank Rise</h1>

        <form>
            <input type="text" placeholder="Name" required>
            <input type="date" required>
            <input type="number" placeholder="Height (in)" required>
            <input type="number" placeholder="Weight (lbs)" required>

            <select required>
                <option value="">Experience Level</option>
                <option>Beginner - 0-6 months</option>
                <option>Intermediate - 1-3 years</option>
                <option>Advanced - 3+ years</option>
            </select>

            <button type="submit">Confirm</button>
        </form>
    </div>
</div>

<script src="script.js"></script>

</body>
</html>
